<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Loading Pembayaran – Catering Yayubi</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange:       #E8622A;
    --orange-light: #F4895A;
    --orange-pale:  #F9C4AE;
    --orange-bg:    #FAECE7;
    --bg:           #C8763A;
    --white:        #ffffff;
    --gray:         #888888;
    --green:        #25D366;
    --green-dark:   #1DAA56;
    --call-bg:      #FDE8D0;
    --call-border:  #F4895A;
  }

  html, body {
    height: 100%;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #ffffff;
  }

  /* ── Outer page ── */
  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    padding: 0;
  }

  .page-label {
    font-size: clamp(11px, 1.5vw, 14px);
    color: rgba(255,255,255,0.85);
    margin-bottom: clamp(8px, 2vw, 18px);
    letter-spacing: 0.01em;
  }

  /* ── Outer card (rounded rect on brown bg) ── */
  .outer-card {
    flex: 1;
    background: #fff;
    border-radius: 0;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(40px, 7vw, 80px) clamp(16px, 5vw, 60px);
    min-height: clamp(340px, 55vw, 640px);
  }

  /* ── Geometric corner decorations ── */
  .corner {
    position: absolute;
    pointer-events: none;
  }
  .corner-tl { top: 0; left: 0; }
  .corner-tr { top: 0; right: 0; }
  .corner-bl { bottom: 0; left: 0; }
  .corner-br { bottom: 0; right: 0; }

  .corner svg {
    width: clamp(80px, 12vw, 160px);
    height: clamp(80px, 12vw, 160px);
    display: block;
  }

  /* ── Inner card (white, slightly elevated) ── */
  .inner-card {
    background: #fff;
    border-radius: clamp(10px, 2vw, 18px);
    box-shadow: 0 4px 40px rgba(216,90,48,0.07), 0 1px 8px rgba(0,0,0,0.04);
    padding: clamp(32px, 6vw, 64px) clamp(24px, 6vw, 80px);
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(10px, 2vw, 18px);
    position: relative;
    z-index: 2;
    text-align: center;
    min-height: clamp(220px, 35vw, 380px);
    justify-content: center;
  }

  /* ── Glow blob ── */
  .blob {
    position: absolute;
    width: clamp(100px, 18vw, 220px);
    height: clamp(60px, 10vw, 120px);
    background: rgba(216,90,48,0.10);
    border-radius: 50%;
    filter: blur(32px);
    bottom: 18%;
    right: 20%;
    pointer-events: none;
    z-index: 1;
  }

  /* ── States ── */
  .state { display: none; flex-direction: column; align-items: center; gap: clamp(8px,1.5vw,14px); width: 100%; }
  .state.active { display: flex; }

  /* ── Typography ── */
  .state-title {
    font-size: clamp(15px, 2.5vw, 22px);
    font-weight: 700;
    color: var(--orange);
    line-height: 1.3;
  }
  .state-sub {
    font-size: clamp(11px, 1.5vw, 14px);
    color: var(--gray);
    font-weight: 400;
  }

  /* ── Spinner ── */
  .spinner {
    width: clamp(40px, 6vw, 60px);
    height: clamp(40px, 6vw, 60px);
    border: 3px solid #FBCFBC;
    border-top-color: #E8622A;
    border-radius: 50%;
    animation: spin 0.85s linear infinite;
    margin-top: 4px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Check icon ── */
  .check-svg {
    width: clamp(40px, 6vw, 58px);
    height: clamp(40px, 6vw, 58px);
    margin-top: 4px;
  }

  /* ── Logo ── */
  .logo-wrap {
    width: clamp(120px, 17vw, 155px);
    height: clamp(120px, 17vw, 155px);
    border-radius: clamp(20px, 3vw, 28px);
    background: linear-gradient(145deg, #F4895A 0%, #E8622A 50%, #D44E1A 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(8px, 1.2vw, 12px);
    box-shadow: 0 6px 28px rgba(212,78,26,0.35);
    margin: 4px 0 8px;
  }
  .logo-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .logo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }
  .logo-fallback {
    width: 85%;
    height: 85%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Info text ── */
  .info-text {
    font-size: clamp(11px, 1.4vw, 13px);
    color: var(--gray);
    margin: 2px 0 4px;
  }

  /* ── Buttons ── */
  .btn-wa, .btn-call {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(6px, 1.2vw, 10px);
    width: 100%;
    max-width: 320px;
    padding: clamp(11px, 1.8vw, 15px) clamp(16px, 3vw, 28px);
    border-radius: 999px;
    border: none;
    cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 600;
    font-size: clamp(12px, 1.6vw, 15px);
    text-decoration: none;
    transition: transform 0.22s cubic-bezier(.34,1.56,.64,1), box-shadow 0.22s ease;
    letter-spacing: 0.01em;
  }

  .btn-wa {
    background: var(--green);
    color: #fff;
    box-shadow: 0 4px 16px rgba(37,211,102,0.25);
  }
  .btn-wa:hover {
    transform: scale(1.07);
    box-shadow: 0 8px 28px rgba(37,211,102,0.35);
    background: var(--green-dark);
  }
  .btn-wa:active { transform: scale(0.98); }

  .btn-call {
    background: var(--call-bg);
    color: var(--orange);
    border: 1.5px solid var(--call-border);
    box-shadow: 0 2px 10px rgba(216,90,48,0.10);
  }
  .btn-call:hover {
    transform: scale(1.07);
    box-shadow: 0 8px 24px rgba(216,90,48,0.20);
    background: #fbd9c5;
  }
  .btn-call:active { transform: scale(0.98); }

  .btn-call .call-label { font-weight: 700; }
  .btn-call .call-sub   { font-size: clamp(9px, 1.1vw, 11px); font-weight: 400; color: var(--orange); opacity: 0.75; }

  /* ── Icon in buttons ── */
  .btn-icon {
    width: clamp(18px, 2.5vw, 22px);
    height: clamp(18px, 2.5vw, 22px);
    flex-shrink: 0;
  }

  /* ── Transition animation between states ── */
  .inner-card { transition: min-height 0.4s ease; }

  /* ── Mobile tweaks ── */
  @media (max-width: 480px) {
    .outer-card { padding: 28px 12px; }
    .inner-card { padding: 28px 18px; }
    .corner svg { width: 64px; height: 64px; }
  }
</style>
</head>

    <div class="corner corner-tl">

      </svg>
    </div>

    <!-- Glow blob -->
    <div class="blob"></div>

    <!-- Inner card -->
    <div class="inner-card" id="innerCard">

      <!-- STATE 1: Loading (spinner) -->
      <div class="state active" id="stateLoading">
        <p class="state-title">Pesanan Sedang Diproses</p>
        <p class="state-sub">Tunggu sebentar</p>
        <div class="spinner"></div>
      </div>
